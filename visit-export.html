<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>تصدير زيارات أمان</title>
<style>
  :root { --teal:#00AEC7; --navy:#002A47; --bg:#F2F4F7; --border:#E0E6ED; --red:#AB2328; }
  * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
  body { background: var(--bg); margin: 0; padding: 24px; color: var(--navy); }
  .card { max-width: 460px; margin: 24px auto; background: #fff; border: 1px solid var(--border);
          border-radius: 14px; padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { margin: 0 0 20px; color: #5F5E5A; font-size: 14px; }
  label { display: block; font-size: 13px; margin: 14px 0 6px; color: #5F5E5A; }
  input[type=text], input[type=password], input[type=date] {
    width: 100%; height: 42px; padding: 0 12px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 15px; }
  .row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .row input { width: auto; height: auto; }
  .dates { display: flex; gap: 12px; }
  .dates > div { flex: 1; }
  button { width: 100%; height: 48px; margin-top: 20px; background: var(--teal); color: #fff;
    border: 0; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .6; cursor: default; }
  #status { margin-top: 16px; font-size: 14px; min-height: 20px; }
  .ok { color: #0F6E56; } .err { color: var(--red); }
  #who { display: none; margin-top: 16px; padding: 10px 12px; border-radius: 10px;
         font-size: 14px; font-weight: 600; }
  #who.good { display: block; background: #E6F4EF; color: #0F6E56; border: 1px solid #BFE3D6; }
  #who.bad  { display: block; background: #FBEAEA; color: var(--red); border: 1px solid #F0C8C9; }
</style>
</head>
<body>
<script>
  // Clickjacking guard — GitHub Pages cannot send X-Frame-Options headers.
  if (window.top !== window.self) { try { window.top.location = window.location; } catch (e) { document.documentElement.innerHTML = ''; } }
</script>
  <div class="card">
    <h1>تصدير زيارات أمان</h1>
    <p class="sub">سجّل الدخول بحساب المشرف، اختر الفترة، ثم نزّل ملف Excel — الصور مدمجة داخل الجدول.</p>

    <label>رقم الموبايل (المشرف)</label>
    <input id="phone" type="text" inputmode="tel" placeholder="+201234567890" autocomplete="off" />

    <label>كلمة المرور</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" />

    <div class="dates">
      <div>
        <label>من تاريخ</label>
        <input id="from" type="date" />
      </div>
      <div>
        <label>إلى تاريخ</label>
        <input id="to" type="date" />
      </div>
    </div>

    <button id="go">تنزيل ملف Excel</button>
    <div id="who"></div>
    <div id="status"></div>
  </div>

<script>
  const SUPABASE_URL = 'https://yflwudkmhqwoscipscbb.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmbHd1ZGttaHF3b3NjaXBzY2JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzM4NTMsImV4cCI6MjA5MTk0OTg1M30.141uW5uriJUKDNJnQ6RYyo2dasWVQy4FUbqyKUBZ48U';

  const $ = (id) => document.getElementById(id);
  // Accept Egyptian numbers in any common form (01…, 201…, 00201…, +201…,
  // Arabic-Indic digits) → the stored E.164 (+201XXXXXXXXX). Mirrors the app +
  // edge function so a supervisor doesn't have to type the +20 prefix.
  const normalizePhone = (raw) => {
    let p = String(raw || '')
      .replace(/[٠-٩]/g, (d) => d.charCodeAt(0) - 0x0660)
      .replace(/[۰-۹]/g, (d) => d.charCodeAt(0) - 0x06f0)
      .replace(/[\s\-().]/g, '');
    if (p.startsWith('00')) p = '+' + p.slice(2);
    if (/^01[0-9]{9}$/.test(p)) return '+2' + p;
    if (/^201[0-9]{9}$/.test(p)) return '+' + p;
    return p;
  };
  const today = new Date(Date.now() + 2*3600*1000).toISOString().slice(0,10); // Cairo today
  $('from').value = today;
  $('to').value = today;
  const status = (msg, cls='') => { const s = $('status'); s.textContent = msg; s.className = cls; };
  const ROLE_AR = { supervisor: 'مشرف', admin: 'مسؤول النظام', sales_rep: 'مندوب مبيعات' };

  $('go').addEventListener('click', async () => {
    const phone = normalizePhone($('phone').value);
    const password = $('password').value;
    if (!phone || !password) return status('أدخل رقم الموبايل وكلمة المرور.', 'err');

    const from = $('from').value, to = $('to').value;
    if (!from || !to) return status('حدد تاريخ البداية والنهاية.', 'err');
    if (from > to) return status('تاريخ البداية بعد تاريخ النهاية — راجع الفترة.', 'err');

    $('go').disabled = true;
    $('who').className = ''; // hide any stale identity banner
    try {
      status('جارٍ تسجيل الدخول…');
      const auth = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'apikey': ANON, 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password }),
      });
      const aj = await auth.json();
      if (!auth.ok || !aj.access_token) throw new Error(aj.error_description || aj.msg || 'فشل تسجيل الدخول');

      // Identity + role gate: show WHO logged in; only supervisor/admin may export.
      // Guards against browser autofill silently logging in as a rep → empty sheet.
      status('جارٍ التحقق من الحساب…');
      const ures = await fetch(
        `${SUPABASE_URL}/rest/v1/users?id=eq.${aj.user.id}&select=name,role,business_unit`,
        { headers: { 'apikey': ANON, 'Authorization': `Bearer ${aj.access_token}` } },
      );
      const me = ures.ok ? (await ures.json())[0] : null;
      if (!me) throw new Error('تعذّر التحقق من هوية الحساب — أعد المحاولة.');

      const privileged = me.role === 'supervisor' || me.role === 'admin';
      // Supervisors are scoped server-side to their own business unit — show it.
      const scopeNote = me.role === 'supervisor' ? ` — وحدة: ${me.business_unit}` : '';
      $('who').textContent = `تم تسجيل الدخول: ${me.name} — ${ROLE_AR[me.role] || me.role}${scopeNote}`;
      $('who').className = privileged ? 'good' : 'bad';
      if (!privileged) {
        throw new Error(
          'هذا الحساب مندوب مبيعات وليس مشرفًا — التصدير متاح لحساب المشرف فقط. ' +
          'غالبًا ملأ المتصفح بيانات دخول قديمة تلقائيًا؛ امسح الخانتين وأدخل رقم المشرف وكلمة مروره يدويًا.'
        );
      }

      status('جارٍ تجهيز ملف Excel (قد يستغرق لحظات مع الصور)…');
      const q = `?from=${from}&to=${to}`;
      const res = await fetch(`${SUPABASE_URL}/functions/v1/export-visits-xlsx${q}`, {
        headers: { 'apikey': ANON, 'Authorization': `Bearer ${aj.access_token}` },
      });
      if (!res.ok) {
        const ej = await res.json().catch(() => ({}));
        throw new Error(ej.detail || ej.error || `خطأ ${res.status}`);
      }
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `aman-visits-${from}_${to}.xlsx`;
      a.click();
      URL.revokeObjectURL(a.href);
      status('تم التنزيل ✓', 'ok');
    } catch (e) {
      status(e.message || 'حدث خطأ', 'err');
    } finally {
      $('go').disabled = false;
    }
  });
</script>
</body>
</html>
